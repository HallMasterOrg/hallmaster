packages:
  - packages/*

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/engines'
  - '@scarf/scarf'
  - '@swc/core'
  - argon2
  - prisma
  - esbuild

# virtua patch is frontend-only; unused when deploying the backend subset
allowUnusedPatches: true

patchedDependencies:
  virtua: patches/virtua.patch
