name: Bug Report
description: File a bug report to help us improve
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please provide as much detail as possible :

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug
      placeholder: The app crashes when I click "Save"...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: It should save the data without error.

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: It crashed with an error message "..."

  - type: input
    id: environment
    attributes:
      label: Environment
      description: (optional) OS, version, browser, etc.
      placeholder: macOS 14.0, Node 20.10.0

  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste logs or attach screenshots if possible
      render: shell
