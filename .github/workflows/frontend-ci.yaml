name: Check, Lint, Format & Build frontend

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js & pnpm
        uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm --filter @hallmaster/frontend... install --frozen-lockfile --prefer-offline

      - name: Check
        run: pnpm --filter @hallmaster/frontend run check --fail-on-warnings

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js & pnpm
        uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm --filter @hallmaster/frontend... install --frozen-lockfile --prefer-offline

      - name: Lint
        run: pnpm --filter @hallmaster/frontend run lint --format github

  format:
    name: Format check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js & pnpm
        uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm --filter @hallmaster/frontend... install --frozen-lockfile --prefer-offline

      - name: Format check
        run: pnpm --filter @hallmaster/frontend run format:check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check, lint, format]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js & pnpm
        uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm --filter @hallmaster/frontend... install --frozen-lockfile --prefer-offline

      - name: Build
        run: pnpm --filter @hallmaster/frontend run build
  
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs:
      - build

    environment: Backend CI

    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install trusted certificat
        run: |
          sudo mkdir -p /usr/local/share/ca-certificates/

          echo "${{ secrets.REGISTRY_CA_CERT }}" > public-key.crt
          sudo cp public-key.crt /usr/local/share/ca-certificates/ca.crt
          sudo update-ca-certificates

          # Install into Docker trust directory
          sudo mkdir -p /etc/docker/certs.d/${{ secrets.REGISTRY_HOST }}
          sudo cp public-key.crt /etc/docker/certs.d/${{ secrets.REGISTRY_HOST }}/ca.crt

      - name: Place CA for BuildKit
        run: |
          mkdir -p ${{ github.workspace }}/buildkit-certs
          echo "${{ secrets.REGISTRY_CA_CERT }}" | tr -d '\r' > ${{ github.workspace }}/buildkit-certs/ca.crt

      - name: Create buildkit config
        run: |
          mkdir -p ${{ github.workspace }}/buildkit-config
          cat <<-EOF > ${{ github.workspace }}/buildkit-config/buildkitd.toml
          [registry."${{ secrets.REGISTRY_HOST }}"]
            insecure = true
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config: ${{ github.workspace }}/buildkit-config/buildkitd.toml
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to private Docker image registry
        uses: docker/login-action@v3.7.0
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: ${{ secrets.REGISTRY_HOST }}/hallmaster/frontend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short

      - name: Build and push image (frontend)
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          platforms: linux/amd64 #,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend via HTTP
        run: |
          curl --insecure -X POST "http://${{ secrets.REGISTRY_HOST }}:9090/deploy/frontend" \
              -H "Authorization: Basic $(echo '${{ secrets.REGISTRY_USERNAME }}:${{ secrets.REGISTRY_PASSWORD }}' | base64)" \
              -H "X-Registry-Host: ${{ secrets.REGISTRY_HOST }}" \
              --data '' -iL
