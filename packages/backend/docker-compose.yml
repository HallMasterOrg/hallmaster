services:
  postgres:
    image: postgres:16.8-alpine3.20
    container_name: hallmaster-postgres
    shm_size: 128mb
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - hallmaster-database:/var/lib/postgresql/data:rw
    ports:
      - "5432:5432"
    networks:
      - hallmaster-network

  backend:
    image: backend
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    networks:
      - hallmaster-network
    restart: unless-stopped

networks:
  hallmaster-network:

volumes:
  hallmaster-database:
